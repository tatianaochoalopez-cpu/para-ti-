<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amor</title>
    <style>
        /* Fuente elegante estilo Slab Serif (similar a Rocklyn) */
        @import url('https://fonts.googleapis.com/css2?family=Arvo:700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
            font-family: 'Arvo', serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Corazones rojos de fondo */
        .background-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-bg {
            position: absolute;
            color: #ff0000; /* Rojo vibrante */
            animation: float 5s infinite ease-in-out;
            opacity: 0.8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }

        /* Pantalla de Inicio */
        #main-container {
            z-index: 10;
            text-align: center;
            cursor: pointer;
            transition: all 0.9s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .heart-pink {
            font-size: 180px;
            color: #ffb6c1; /* Rosado grande */
            display: block;
            margin-bottom: 10px;
            animation: pulse-suave 1.2s infinite alternate;
            filter: drop-shadow(0 0 15px rgba(255, 182, 193, 0.8));
        }

        .text-click {
            font-size: 30px;
            color: #ff69b4;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Animación de Puerta Abierta */
        .door-open {
            transform: scale(0) rotateY(180deg);
            opacity: 0;
        }

        /* Mensaje Final */
        #secret-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: white;
            z-index: 5;
            text-align: center;
            padding: 30px;
        }

        .message-text {
            font-size: 2.8rem;
            color: #000000; /* LETRA NEGRA */
            max-width: 90%;
            line-height: 1.4;
            animation: zoomIn 1.2s ease-out;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        @keyframes pulse-suave {
            to { transform: scale(1.1); }
        }

        @keyframes zoomIn {
            from { transform: scale(0.2); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background-hearts" id="heartBox"></div>

    <div id="main-container" onclick="iniciarSorpresa()">
        <div class="heart-pink">♥️</div>
        <div class="text-click">PARA TI</div>
    </div>

    <div id="secret-message">
        <h1 class="message-text">TE CONOCÍ POR CASUALIDAD, TE HABLÉ PARA MOLESTARTE LA PACIENCIA Y UN DIA PARA OTRO TE METISTE EN MI CORAZÓN  TE AMOOO MUCHO PATE ♥️🐥</h1>
    </div>

    <audio id="musicaRomantica" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Lluvia de corazones rojos constante
        const heartBox = document.getElementById('heartBox');
        
        function crearCorazones() {
            for (let i = 0; i < 65; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDelay = (Math.random() * 5) + 's';
                heartBox.appendChild(heart);
            }
        }
        crearCorazones();

        function iniciarSorpresa() {
            const container = document.getElementById('main-container');
            const message = document.getElementById('secret-message');
            const audio = document.getElementById('musicaRomantica');

            // Iniciar el ritmo romántico
            audio.play().catch(e => console.log("Audio activo"));

            // Efecto de puerta
            container.classList.add('door-open');

            setTimeout(() => {
                container.style.display = 'none';
                message.style.display = 'flex';
                // Asegurar que los corazones rojos sigan ahí
                message.appendChild(heartBox);
            }, 800);
        }
    </script>
</body>
