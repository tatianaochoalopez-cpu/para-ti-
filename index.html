<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amorchito</title>
    <style>
        /* Importamos una fuente similar a Rocklyn/Slab Serif */
        @import url('https://fonts.googleapis.com/css2?family=Arvo:700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
            font-family: 'Arvo', serif; /* Lo más cercano a Rocklyn disponible en web */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Corazones rojos de fondo */
        .background-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart-bg {
            position: absolute;
            color: #ff4d4d;
            animation: float 4s infinite ease-in-out;
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* Pantalla Inicial */
        #main-container {
            z-index: 10;
            text-align: center;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .heart-pink {
            font-size: 160px;
            color: #ffb6c1;
            display: block;
            margin-bottom: 15px;
            animation: pulse-ritmo 0.6s infinite alternate; /* Latido con ritmo */
            filter: drop-shadow(0 5px 15px rgba(255, 182, 193, 0.6));
        }

        .text-click {
            font-size: 28px;
            color: #ff69b4;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Animación de Puerta */
        .door-open {
            transform: scale(0) rotateY(180deg);
            opacity: 0;
        }

        /* Mensaje Final */
        #secret-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: white;
            z-index: 5;
            text-align: center;
            padding: 20px;
        }

        .message-text {
            font-size: 2.5rem;
            color: #d32f2f;
            max-width: 85%;
            line-height: 1.3;
            animation: appear 1s ease-out;
        }

        @keyframes pulse-ritmo {
            to { transform: scale(1.15); }
        }

        @keyframes appear {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background-hearts" id="heartBox"></div>

    <div id="main-container" onclick="openSurprise()">
        <div class="heart-pink">♥️</div>
        <div class="text-click">PARA TI</div>
    </div>

    <div id="secret-message">
        <h1 class="message-text">TE AMO MUCHO MI AMOR Y ERES MUY ESPECIAL PARA MI AMORCHITO MIO ♥️🐥</h1>
    </div>

    <audio id="audioRitmo" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Crear lluvia de corazones rojos
        const heartBox = document.getElementById('heartBox');
        const heartIcons = ['❤️', '♥️', '❣'];
        
        for (let i = 0; i < 60; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart-bg';
            heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDelay = (Math.random() * 3) + 's';
            heartBox.appendChild(heart);
        }

        function openSurprise() {
            const container = document.getElementById('main-container');
            const message = document.getElementById('secret-message');
            const audio = document.getElementById('audioRitmo');

            // Reproducir el ritmo
            audio.play().catch(e => console.log("Clic necesario para audio"));

            // Efecto de puerta abierta
            container.classList.add('door-open');

            setTimeout(() => {
                container.style.display = 'none';
                message.style.display = 'flex';
                // El fondo de corazones se mantiene en el mensaje
                message.appendChild(heartBox);
            }, 700);
        }
    </script>
</body>
</html>
